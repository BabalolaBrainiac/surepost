name: platform-formatter
version: "2.0.0"
description: >
  formats raw content to meet the exact technical and stylistic requirements
  of each platform. enforces character limits, hashtag counts, aspect ratios,
  video length limits, and platform-specific formatting rules. ensures every
  post is publish-ready before it reaches the posting agent.

input_schema:
  type: object
  required: [platform, format, raw_content]
  properties:
    platform:
      type: string
      enum: [instagram, tiktok, twitter]
    format:
      type: string
      enum: [video_script, carousel, caption, thread, tweet, story, reel]
    raw_content:
      type: object
      description: unformatted content from the content-writer skill
      properties:
        text:
          type: string
        slides:
          type: array
          items:
            type: object
        tweets:
          type: array
          items:
            type: object
        hashtags:
          type: array
          items:
            type: string
        script:
          type: object
    affiliate_disclosure:
      type: string
      description: disclosure text to prepend or append if present
    target_length_seconds:
      type: integer
      description: target video duration for tiktok/reels

output_schema:
  type: object
  required: [formatted_content, platform, format, is_valid]
  properties:
    formatted_content:
      type: object
      properties:
        caption:
          type: string
          description: final caption with hashtags and disclosure included
        caption_char_count:
          type: integer
        hashtags:
          type: array
          items:
            type: string
        hashtag_count:
          type: integer
        slides:
          type: array
          items:
            type: object
            properties:
              slide_number: { type: integer }
              headline: { type: string }
              body: { type: string }
              char_count: { type: integer }
        tweets:
          type: array
          items:
            type: object
            properties:
              number: { type: integer }
              text: { type: string }
              char_count: { type: integer }
              is_over_limit: { type: boolean }
        script_seconds:
          type: integer
        media_spec:
          type: object
          properties:
            aspect_ratio: { type: string }
            min_resolution: { type: string }
            max_file_size_mb: { type: integer }
            format: { type: string }
    is_valid:
      type: boolean
      description: true if all platform rules pass
    violations:
      type: array
      items:
        type: object
        properties:
          rule: { type: string }
          detail: { type: string }
          auto_fixed: { type: boolean }
    platform_rules_applied:
      type: object
      properties:
        max_caption_chars: { type: integer }
        max_hashtags: { type: integer }
        max_video_seconds: { type: integer }
        hashtag_placement: { type: string }

platform_rules:
  instagram:
    caption:
      max_chars: 2200
      hashtag_placement: caption_end
      max_hashtags: 30
      recommended_hashtags: 10
    reel:
      max_seconds: 90
      aspect_ratio: "9:16"
      min_resolution: "1080x1920"
      max_file_size_mb: 250
      format: mp4
    carousel:
      max_slides: 10
      min_slides: 2
      aspect_ratio: "1:1"
      min_resolution: "1080x1080"
    story:
      max_seconds: 60
      aspect_ratio: "9:16"
      min_resolution: "1080x1920"

  tiktok:
    caption:
      max_chars: 2200
      hashtag_placement: caption_end
      max_hashtags: 10
      recommended_hashtags: 5
    video:
      min_seconds: 5
      max_seconds: 180
      recommended_seconds: 60
      aspect_ratio: "9:16"
      min_resolution: "1080x1920"
      max_file_size_mb: 287
      format: mp4

  twitter:
    tweet:
      max_chars: 280
      url_chars: 23
      media_chars: 24
    thread:
      max_tweets: 25
      numbering_format: "[n/total]"

examples:
  - input:
      platform: "twitter"
      format: "thread"
      raw_content:
        tweets:
          - number: 1
            text: "5 free AI tools that are replacing $500/month subscriptions. a thread."
          - number: 2
            text: "1. Claude.ai free tier — writes better than most humans. use it for captions, emails, research. the free plan is genuinely good."
          - number: 3
            text: "2. Canva free — stop paying for Adobe. templates, brand kit, video editing. everything a creator needs."
        hashtags: ["AItools", "makemoneyonline", "sidehustle"]
    output:
      formatted_content:
        tweets:
          - number: 1
            text: "5 free AI tools that are replacing $500/month subscriptions. a thread. [1/3]"
            char_count: 72
            is_over_limit: false
          - number: 2
            text: "1. Claude.ai free tier — writes better than most humans. use it for captions, emails, research. the free plan is genuinely good. [2/3]"
            char_count: 137
            is_over_limit: false
          - number: 3
            text: "3. Canva free — stop paying for Adobe. templates, brand kit, video editing. everything a creator needs. #AItools #makemoneyonline #sidehustle [3/3]"
            char_count: 149
            is_over_limit: false
      is_valid: true
      violations: []
      platform_rules_applied:
        max_caption_chars: 280
        max_hashtags: 25
        hashtag_placement: "last_tweet"
